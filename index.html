<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contas de Casa</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav"></nav>

<main class="page">
  <div class="page-title">
    <div class="page-title-accent" style="background:var(--ink)"></div>
    <div>
      <h1>CONTAS<br>DE CASA</h1>
      <p class="sub">Administração de despesas domésticas</p>
    </div>
  </div>

  <!-- Barra de totais: acumulado + mês atual -->
  <div class="totals-row" id="totals-row" style="display:none">
    <div class="total-bar total-bar--acumulado">
      <span class="label">TOTAL ACUMULADO</span>
      <span class="value" id="total-geral">—</span>
    </div>
    <div class="total-bar total-bar--mes">
      <span class="label" id="label-mes">ESTE MÊS</span>
      <span class="value" id="total-mes">—</span>
    </div>
  </div>

  <div class="cat-grid" id="cat-grid">
    <div class="empty" style="grid-column:1/-1">Carregando dados…</div>
  </div>
</main>

<footer>© Alexandre Lemes &nbsp;·&nbsp; Contas de Casa</footer>

<script type="module">
  import { requireAuth, getTotais } from './js/supabase.js';
  import { renderNav, brl }         from './js/shared.js';

  await requireAuth();
  await renderNav('index');

  const cats = [
    { key: 'agua',     label: 'Água',     href: 'pages/agua.html',     color: 'var(--agua)'     },
    { key: 'energia',  label: 'Energia',  href: 'pages/energia.html',  color: 'var(--energia)'  },
    { key: 'internet', label: 'Internet', href: 'pages/internet.html', color: 'var(--internet)' },
    { key: 'vivo',     label: 'Vivo',     href: 'pages/vivo.html',     color: 'var(--vivo)'     },
  ];

  try {
    const { totais, counts, totaisMes, mesAtual } = await getTotais();

    const totalGeral  = Object.values(totais).reduce((s, v) => s + v, 0);
    const totalMesAtual = Object.values(totaisMes).reduce((s, v) => s + v, 0);

    document.querySelector('#totals-row').style.display  = 'flex';
    document.querySelector('#total-geral').textContent   = brl(totalGeral);
    document.querySelector('#total-mes').textContent     = totalMesAtual > 0 ? brl(totalMesAtual) : 'Sem lançamentos';
    document.querySelector('#label-mes').textContent     = mesAtual.toUpperCase();

    document.querySelector('#cat-grid').innerHTML = cats.map(c => {
      const tot    = totais[c.key] ?? 0;
      const n      = counts[c.key] ?? 0;
      const med    = n ? tot / n : 0;
      const totMes = totaisMes[c.key] ?? 0;
      const mesTag = totMes > 0
        ? `<div class="cat-mes">${mesAtual}: ${brl(totMes)}</div>`
        : '';
      return `
        <a class="cat-card" href="${c.href}">
          <span class="cat-pill" style="background:${c.color}">${c.key.toUpperCase()}</span>
          <h2>${c.label}</h2>
          <div class="cat-total">${brl(tot)}</div>
          <div class="cat-meta">${n} meses · média ${brl(med)}</div>
          ${mesTag}
          <span class="cat-arrow">↗</span>
        </a>
      `;
    }).join('');

  } catch (err) {
    document.querySelector('#cat-grid').innerHTML =
      `<div class="empty" style="grid-column:1/-1;color:var(--energia)">Erro ao carregar: ${err.message}</div>`;
  }
</script>
</body>
</html>
