<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internet · Contas de Casa</title>
  <link rel="stylesheet" href="../css/style.css">
  <style> :root { --cat: var(--internet); } </style>
</head>
<body>

<nav class="nav"></nav>

<main class="page">

  <div class="page-title">
    <div class="page-title-accent"></div>
    <div>
      <h1>CONTA<br>DE INTERNET</h1>
      <p class="sub" id="sub">Carregando…</p>
    </div>
  </div>

  <div class="stat-strip" id="stats">
    <div class="stat-block"><div class="stat-label">Aguarde</div><div class="stat-value">…</div></div>
  </div>

  <!-- Gráfico -->
  <div class="chart-card" id="chart-card" style="display:none">
    <div class="chart-card-header">EVOLUÇÃO DOS VALORES</div>
    <div class="chart-card-body">
      <canvas id="chart-linha" height="90"></canvas>
    </div>
  </div>

  <!-- Add form -->
  <div class="add-section">
    <div class="add-section-header" id="form-toggle">
      REGISTRAR NOVA CONTA <span>+</span>
    </div>
    <div class="add-form" id="add-form">
      <div class="field">
        <label>Mês / Ano</label>
        <input type="month" id="f-mes">
      </div>
      <div class="field">
        <label>Valor (R$)</label>
        <input type="number" id="f-valor" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="field">
        <label>Data de pagamento</label>
        <input type="date" id="f-data">
      </div>
      <div class="field" style="flex:0;min-width:120px">
        <label>Status</label>
        <select id="f-paga" style="font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 12px;border:2px solid var(--border);background:var(--paper);color:var(--ink);outline:none;">
          <option value="true">Paga</option>
          <option value="false">Em aberto</option>
        </select>
      </div>
      <button class="btn-add" id="btn-add">ADICIONAR</button>
    </div>
  </div>

  <!-- Bills list -->
  <div class="bills-section">
    <div class="bills-header">
      <h2>HISTÓRICO</h2>
      <span class="bills-count" id="bills-count"></span>
    </div>
    <div id="bills-section"></div>
  </div>

</main>

<footer>© Alexandre Lemes &nbsp;·&nbsp; Contas de Casa</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script type="module">
  import { requireAuth, getContas, addConta, deleteConta } from '../js/supabase.js';
  import { renderNav, renderTable, renderChart, brl, total, media } from '../js/shared.js';

  const CAT   = 'internet';
  const COLOR = '#008f3c';

  // converte "2026-03" → "Março/2026"
  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                 'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  function monthInputToLabel(val) {
    if (!val) return '';
    const [ano, mes] = val.split('-');
    return MESES[parseInt(mes) - 1] + '/' + ano;
  }

  // converte "2026-03-15" → "15/03/2026"
  function dateInputToLabel(val) {
    if (!val) return '';
    const [ano, mes, dia] = val.split('-');
    return `${dia}/${mes}/${ano}`;
  }

  await requireAuth();
  await renderNav(CAT);

  let list = [];
  let chartInstance = null;

  async function load() {
    list = await getContas(CAT);
    refresh();
  }

  function refresh() {
    document.querySelector('#sub').textContent = `${list.length} meses registrados`;

    const tot = total(list);
    const med = media(list);
    const max = list.length ? Math.max(...list.map(c => parseFloat(c.valor))) : 0;

    document.querySelector('#stats').innerHTML = `
      <div class="stat-block">
        <div class="stat-label">Total pago</div>
        <div class="stat-value">${brl(tot)}</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">Média mensal</div>
        <div class="stat-value">${brl(med)}</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">Maior conta</div>
        <div class="stat-value">${brl(max)}</div>
      </div>
    `;

    if (list.length >= 2) {
      document.querySelector('#chart-card').style.display = 'block';
      if (chartInstance) chartInstance.destroy();
      chartInstance = renderChart('chart-linha', list, COLOR);
    }

    renderTable(list, async id => {
      if (!confirm('Remover esta conta?')) return;
      try {
        await deleteConta(id);
        list = list.filter(c => c.id !== id);
        refresh();
      } catch (err) {
        alert('Erro ao remover: ' + err.message);
      }
    });
  }

  await load();

  // form toggle
  const header = document.querySelector('#form-toggle');
  const form   = document.querySelector('#add-form');
  header.addEventListener('click', () => {
    header.classList.toggle('open');
    form.classList.toggle('open');
  });

  // submit
  const btnAdd = document.querySelector('#btn-add');
  btnAdd.addEventListener('click', async () => {
    const mesRaw    = document.querySelector('#f-mes').value;
    const valor     = parseFloat(document.querySelector('#f-valor').value);
    const dataRaw   = document.querySelector('#f-data').value;
    const paga      = document.querySelector('#f-paga').value === 'true';

    const mes      = monthInputToLabel(mesRaw);
    const data_pgto = dateInputToLabel(dataRaw);

    if (!mes || isNaN(valor) || valor <= 0) {
      alert('Selecione o mês e preencha o valor.');
      return;
    }

    btnAdd.disabled    = true;
    btnAdd.textContent = 'SALVANDO…';

    try {
      const nova = await addConta(CAT, { mes, valor, data_pgto, paga });
      list.push(nova);
      refresh();
      document.querySelector('#f-mes').value   = '';
      document.querySelector('#f-valor').value = '';
      document.querySelector('#f-data').value  = '';
      header.classList.remove('open');
      form.classList.remove('open');
    } catch (err) {
      alert('Erro ao salvar: ' + err.message);
    } finally {
      btnAdd.disabled    = false;
      btnAdd.textContent = 'ADICIONAR';
    }
  });
</script>
</body>
</html>
